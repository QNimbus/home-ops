---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pgadmin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      pgadmin:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/dpage/pgadmin4
              tag: 9.4.0
            env:
              PGADMIN_LISTEN_PORT: &port 5050
              PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 10
              PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
              PGADMIN_CONFIG_MAIL_PORT: "587"
              PGADMIN_CONFIG_MAIL_USE_TLS: "True"
              PGADMIN_DISABLE_POSTFIX: "True"
              PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
              PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
              PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED: "False"
            envFrom:
              - secretRef:
                  name: &secret pgadmin-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /misc/ping
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 150Mi
              limits:
                memory: 384Mi
    defaultPodOptions:
      securityContext:
        runAsUser: "${APP_UID:-5050}"
        runAsGroup: "${APP_GID:-5050}"
        fsGroup: "${APP_GID:-5050}"
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      pgpass:
        type: secret
        name: *secret
        defaultMode: 0600
        advancedMounts:
          pgadmin:
            app:
              - path: /pgadmin4
                subPath: .pgpass
                readOnly: true
      config:
        existingClaim: pgadmin-config
        advancedMounts:
          pgadmin:
            app:
              - path: /var/lib/pgadmin
      servers-json-file:
        type: configMap
        name: servers.json
        globalMounts:
          - path: /pgadmin4/servers.json
            subPath: servers.json
            readOnly: true
    route:
      app:
        hostnames: ["pgadmin.${DOMAIN_APP}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https-app
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
