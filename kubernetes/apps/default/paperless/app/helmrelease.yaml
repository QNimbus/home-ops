---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      paperless:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.17.1@sha256:33b1ef48f69e5a0ab8acc9cdf0f25bcd64e98b88d0c5b0fdcb2ad0830e9ae8b5
            env:
              # Basic Configuration
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              PAPERLESS_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: paperless-secret
                    key: PAPERLESS_SECRET_KEY
              PAPERLESS_URL: https://paperless.${SECRET_DOMAIN}
              PAPERLESS_TRUSTED_PROXIES: 10.96.0.0/12,10.244.0.0/16
              PAPERLESS_ALLOWED_HOSTS: paperless.${SECRET_DOMAIN}
              PAPERLESS_CORS_ALLOWED_HOSTS: https://paperless.${SECRET_DOMAIN}
              PAPERLESS_USE_X_FORWARD_HOST: "true"
              PAPERLESS_USE_X_FORWARD_PORT: "true"
              PAPERLESS_FORCE_SCRIPT_NAME: /

              # User Configuration
              PAPERLESS_ADMIN_USER: admin
              PAPERLESS_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: paperless-secret
                    key: PAPERLESS_ADMIN_PASSWORD
              PAPERLESS_ADMIN_MAIL: admin@${SECRET_DOMAIN}

              # Database Configuration (PostgreSQL)
              PAPERLESS_DBENGINE: postgresql
              PAPERLESS_DBHOST: paperless-postgresql.default.svc.cluster.local
              PAPERLESS_DBNAME: paperless
              PAPERLESS_DBUSER: paperless
              PAPERLESS_DBPASS:
                valueFrom:
                  secretKeyRef:
                    name: paperless-secret
                    key: PAPERLESS_DBPASS
              PAPERLESS_DBPORT: "5432"

              # Redis Configuration
              PAPERLESS_REDIS:
                valueFrom:
                  secretKeyRef:
                    name: paperless-secret
                    key: PAPERLESS_REDIS

              # Storage Configuration
              PAPERLESS_DATA_DIR: /usr/src/paperless/data
              PAPERLESS_MEDIA_ROOT: /usr/src/paperless/media
              PAPERLESS_STATICDIR: /usr/src/paperless/static
              PAPERLESS_FILENAME_FORMAT: "{created_year}/{correspondent}/{title}"

              # OCR Configuration
              PAPERLESS_OCR_LANGUAGE: eng
              PAPERLESS_OCR_LANGUAGES: eng
              PAPERLESS_OCR_MODE: skip
              PAPERLESS_OCR_SKIP_ARCHIVE_FILE: with_text
              PAPERLESS_OCR_CLEAN: clean
              PAPERLESS_OCR_DESKEW: "true"
              PAPERLESS_OCR_ROTATE_PAGES: "true"
              PAPERLESS_OCR_ROTATE_PAGES_THRESHOLD: 12
              PAPERLESS_OCR_OUTPUT_TYPE: pdfa
              PAPERLESS_OCR_PAGES: 0
              PAPERLESS_OCR_IMAGE_DPI: 300
              PAPERLESS_OCR_USER_ARGS: '{"invalidate_digital_signatures": true}'

              # Consumer Configuration
              PAPERLESS_CONSUMER_POLLING: 0
              PAPERLESS_CONSUMER_DELETE_DUPLICATES: "true"
              PAPERLESS_CONSUMER_RECURSIVE: "true"
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
              PAPERLESS_CONSUMER_IGNORE_PATTERNS: '["*.tmp", ".DS_Store/*", "._*"]'

              # Tika Configuration (for better document parsing)
              PAPERLESS_TIKA_ENABLED: "true"
              PAPERLESS_TIKA_ENDPOINT: http://paperless-tika:9998
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless-gotenberg:3000

              # Additional Configuration
              PAPERLESS_TASK_WORKERS: 2
              PAPERLESS_THREADS_PER_WORKER: 1
              PAPERLESS_WORKER_TIMEOUT: 1800
              PAPERLESS_TIME_ZONE: ${TIMEZONE}
              PAPERLESS_ENABLE_HTTP_REMOTE_USER: "false"
              PAPERLESS_LOGOUT_REDIRECT_URL: /

              # Document Processing
              PAPERLESS_CONVERT_MEMORY_LIMIT: 0
              PAPERLESS_CONVERT_TMPDIR: /tmp
              PAPERLESS_OPTIMIZE_THUMBNAILS: "true"

              # Logging
              PAPERLESS_LOGROTATE_MAX_SIZE: 1048576
              PAPERLESS_LOGROTATE_MAX_BACKUPS: 20

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8000
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi

          # Tika server for document parsing
          tika:
            image:
              repository: ghcr.io/paperless-ngx/tika
              tag: 2.9.1-full@sha256:e20b37b20bf3b2b54a24e9bec75b15be6e27c0ef9ca8966b7e9fcb03b9d5b46b
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

          # Gotenberg for document conversion
          gotenberg:
            image:
              repository: docker.io/gotenberg/gotenberg
              tag: 8.17.0@sha256:3ac36389a59e43a64ac56d4b683bd680ed8060374a332cbf8cef77bc6f752798
            env:
              DISABLE_GOOGLE_CHROME: "1"
            command:
              - gotenberg
              - --chromium-disable-javascript=true
              - --chromium-allow-list=file:///tmp/.*
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [10000]

    service:
      app:
        controller: paperless
        ports:
          http:
            port: *port
      tika:
        controller: paperless
        ports:
          http:
            port: 9998
      gotenberg:
        controller: paperless
        ports:
          http:
            port: 3000

    route:
      app:
        hostnames: ["paperless.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: paperless-data
        advancedMounts:
          paperless:
            app:
              - path: /usr/src/paperless/data

      media:
        type: persistentVolumeClaim
        existingClaim: paperless-media
        advancedMounts:
          paperless:
            app:
              - path: /usr/src/paperless/media

      consume:
        type: persistentVolumeClaim
        existingClaim: paperless-consume
        advancedMounts:
          paperless:
            app:
              - path: /usr/src/paperless/consume

      export:
        type: persistentVolumeClaim
        existingClaim: paperless-export
        advancedMounts:
          paperless:
            app:
              - path: /usr/src/paperless/export

      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi
        advancedMounts:
          paperless:
            app:
              - path: /tmp
            tika:
              - path: /tmp
            gotenberg:
              - path: /tmp
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-export
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
