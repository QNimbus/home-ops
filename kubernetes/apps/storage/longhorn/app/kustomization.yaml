---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./httproute.yaml
  - ./node-configs/talos-k8s-server-1.yaml
  - ./node-configs/talos-k8s-server-2.yaml
  - ./node-configs/talos-k8s-server-3.yaml
  - ./node-configs/talos-k8s-server-4.yaml
configMapGenerator:
  - name: longhorn-values
    files:
      - values.yaml=./helm/values.yaml
configurations:
  - ./helm/kustomizeconfig.yaml
